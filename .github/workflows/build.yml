name: Build YDROP APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Download Gradle wrapper jar
        run: |
          mkdir -p gradle/wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.jar \
            https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --warning-mode none

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: YDROP-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.${{ github.run_number }}
          name: "YDROP v1.${{ github.run_number }}"
          files: app/build/outputs/apk/debug/app-debug.apk
          body: "YDROP YouTube Downloader — install on Android"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
