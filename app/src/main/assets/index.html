<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>YDROP</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Space Grotesk',sans-serif;background:#0d0d0f;color:#f0ede8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.wrap{width:100%;max-width:560px}

/* Logo */
.logo{text-align:center;margin-bottom:36px}
.logo h1{font-size:52px;font-weight:700;letter-spacing:-1px;color:#fff}
.logo h1 span{color:#ff5c35}
.logo p{font-family:'JetBrains Mono',monospace;font-size:11px;color:#555;letter-spacing:3px;text-transform:uppercase;margin-top:4px}

/* Card */
.card{background:#17171a;border:1px solid #252528;border-radius:16px;padding:24px;margin-bottom:16px}

/* Input */
.input-row{display:flex;gap:10px}
input[type=text]{flex:1;background:#0d0d0f;border:1.5px solid #2a2a2e;border-radius:10px;padding:14px 16px;font-family:'JetBrains Mono',monospace;font-size:13px;color:#f0ede8;outline:none;transition:border-color .2s}
input[type=text]::placeholder{color:#444}
input[type=text]:focus{border-color:#ff5c35}
.btn{background:#ff5c35;color:#fff;border:none;border-radius:10px;padding:14px 22px;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14px;cursor:pointer;white-space:nowrap;transition:all .15s}
.btn:hover{background:#ff7a57;transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn:disabled{background:#2a2a2e;color:#555;cursor:not-allowed;transform:none}
.btn.green{background:#22c55e}
.btn.green:hover{background:#4ade80}
.btn.ghost{background:transparent;border:1.5px solid #2a2a2e;color:#aaa}
.btn.ghost:hover{border-color:#555;color:#fff}

/* Preview */
#preview{display:none;animation:fadeup .3s ease}
@keyframes fadeup{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.video-row{display:flex;gap:14px;margin-bottom:20px}
.thumb{width:130px;height:73px;border-radius:8px;overflow:hidden;background:#111;flex-shrink:0;border:1px solid #222;position:relative}
.thumb img{width:100%;height:100%;object-fit:cover}
.dur{position:absolute;bottom:4px;right:4px;background:rgba(0,0,0,.85);font-family:'JetBrains Mono',monospace;font-size:10px;padding:2px 5px;border-radius:4px}
.vmeta{flex:1;min-width:0}
.vtitle{font-size:14px;font-weight:500;line-height:1.4;margin-bottom:5px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.vsub{font-family:'JetBrains Mono',monospace;font-size:11px;color:#555}

/* Mode */
.lbl{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#555;margin-bottom:10px;display:block}
.modes{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
.mode{border:1.5px solid #2a2a2e;border-radius:10px;padding:12px;text-align:center;cursor:pointer;transition:all .15s}
.mode:hover{border-color:#444}
.mode.on{border-color:#ff5c35;background:rgba(255,92,53,.07)}
.mode-icon{font-size:22px;display:block;margin-bottom:3px}
.mode-name{font-size:13px;font-weight:600}
.mode-hint{font-family:'JetBrains Mono',monospace;font-size:10px;color:#555;display:block;margin-top:2px}

/* Quality */
#qual-section{margin-bottom:18px}
.pills{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.pill{padding:6px 14px;border:1.5px solid #2a2a2e;border-radius:20px;font-family:'JetBrains Mono',monospace;font-size:11px;cursor:pointer;color:#666;transition:all .15s}
.pill:hover{border-color:#555;color:#aaa}
.pill.on{border-color:#ff5c35;background:rgba(255,92,53,.1);color:#ff7a57}

/* Progress */
#prog{display:none;animation:fadeup .3s ease}
.prog-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.prog-label{font-family:'JetBrains Mono',monospace;font-size:11px;color:#ff5c35;letter-spacing:1px}
.prog-pct{font-size:32px;font-weight:700;color:#fff}
.bar-bg{height:4px;background:#252528;border-radius:2px;margin-bottom:12px;overflow:hidden}
.bar-fill{height:100%;background:linear-gradient(to right,#c43516,#ff5c35);border-radius:2px;transition:width .4s ease;width:0}
.stats{display:flex;gap:20px}
.stat-lbl{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#444;margin-bottom:2px}
.stat-val{font-family:'JetBrains Mono',monospace;font-size:13px;color:#f0ede8}

/* Result */
#result{display:none;animation:fadeup .3s ease}
.ok{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);border-radius:12px;padding:20px}
.fail{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);border-radius:12px;padding:20px}
.r-icon{font-size:30px;margin-bottom:8px}
.r-title{font-size:20px;font-weight:700;margin-bottom:4px}
.r-sub{font-family:'JetBrains Mono',monospace;font-size:11px;color:#555}
.r-path{margin-top:10px;background:#0d0d0f;border-radius:8px;padding:8px 12px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#ff5c35;word-break:break-all}

/* Spinner */
.spin{display:inline-block;width:13px;height:13px;border:2px solid #333;border-top-color:#ff5c35;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Status msg */
#status-msg{font-family:'JetBrains Mono',monospace;font-size:11px;color:#555;margin-top:12px;min-height:16px}
</style>
</head>
<body>
<div class="wrap">

  <div class="logo">
    <h1>YD<span>R</span>OP</h1>
    <p>Personal YouTube Downloader</p>
  </div>

  <!-- URL INPUT -->
  <div class="card">
    <div class="input-row">
      <input type="text" id="url" placeholder="Paste YouTube URL here..." autocomplete="off" spellcheck="false"/>
      <button class="btn" id="fetch-btn" onclick="fetchInfo()">FETCH</button>
    </div>
  </div>

  <!-- VIDEO PREVIEW + OPTIONS -->
  <div class="card" id="preview">
    <div class="video-row">
      <div class="thumb"><img id="thumb" src="" alt=""/><span class="dur" id="dur"></span></div>
      <div class="vmeta">
        <div class="vtitle" id="vtitle"></div>
        <div class="vsub" id="vsub"></div>
      </div>
    </div>

    <span class="lbl">Mode</span>
    <div class="modes">
      <div class="mode on" id="m-video" onclick="setMode('video')">
        <span class="mode-icon">🎬</span>
        <span class="mode-name">Video + Audio</span>
        <span class="mode-hint">saves as .mp4</span>
      </div>
      <div class="mode" id="m-audio" onclick="setMode('audio')">
        <span class="mode-icon">🎵</span>
        <span class="mode-name">Audio Only</span>
        <span class="mode-hint">saves as .mp3</span>
      </div>
    </div>

    <div id="qual-section">
      <span class="lbl">Quality</span>
      <div class="pills" id="pills"></div>
    </div>

    <button class="btn green" style="width:100%;padding:16px;font-size:16px" onclick="startDownload()">
      ⬇ &nbsp;DOWNLOAD
    </button>
  </div>

  <!-- PROGRESS -->
  <div class="card" id="prog">
    <div class="prog-top">
      <span class="prog-label" id="prog-lbl"><span class="spin"></span>DOWNLOADING</span>
      <span class="prog-pct" id="prog-pct">0%</span>
    </div>
    <div class="bar-bg"><div class="bar-fill" id="bar"></div></div>
    <div class="stats">
      <div><div class="stat-lbl">Size</div><div class="stat-val" id="s-size">—</div></div>
      <div><div class="stat-lbl">Speed</div><div class="stat-val" id="s-speed">—</div></div>
      <div><div class="stat-lbl">ETA</div><div class="stat-val" id="s-eta">—</div></div>
    </div>
    <div id="status-msg"></div>
  </div>

  <!-- RESULT -->
  <div id="result"></div>

</div>
<script>
let mode='video', quality='best', es=null;

document.getElementById('url').addEventListener('keydown',e=>{if(e.key==='Enter')fetchInfo()});
document.getElementById('url').addEventListener('paste',()=>setTimeout(()=>{
  const v=document.getElementById('url').value;
  if(v.includes('youtube.com')||v.includes('youtu.be'))fetchInfo();
},60));

async function fetchInfo(){
  const url=document.getElementById('url').value.trim();
  if(!url)return shake();
  const btn=document.getElementById('fetch-btn');
  btn.disabled=true;btn.innerHTML='<span class="spin"></span>';
  hide('preview');hide('prog');hide('result');
  try{
    const r=await fetch('/info?url='+encodeURIComponent(url));
    const d=await r.json();
    if(d.error)throw new Error(d.error);
    document.getElementById('thumb').src=d.thumbnail;
    document.getElementById('dur').textContent=d.duration;
    document.getElementById('vtitle').textContent=d.title;
    document.getElementById('vsub').textContent=(d.uploader||'')+(d.views?' · '+fmtViews(d.views)+' views':'');
    buildPills(d.formats);
    show('preview');
  }catch(e){
    showResult(false,'Could not fetch video','Check the URL and make sure the server is running.');
  }
  btn.disabled=false;btn.innerHTML='FETCH';
}

function buildPills(formats){
  const c=document.getElementById('pills');
  c.innerHTML='';quality='best';
  const best=pill('Best','best',true);c.appendChild(best);
  formats.forEach(f=>{const p=pill(f.label,f.value,false);c.appendChild(p)});
}
function pill(label,val,active){
  const p=document.createElement('div');
  p.className='pill'+(active?' on':'');
  p.textContent=label;
  p.onclick=()=>{document.querySelectorAll('.pill').forEach(x=>x.classList.remove('on'));p.classList.add('on');quality=val};
  return p;
}

function setMode(m){
  mode=m;
  document.getElementById('m-video').classList.toggle('on',m==='video');
  document.getElementById('m-audio').classList.toggle('on',m==='audio');
  document.getElementById('qual-section').style.display=m==='audio'?'none':'block';
}

function startDownload(){
  const url=document.getElementById('url').value.trim();
  if(!url)return;
  if(es)es.close();
  hide('preview');hide('result');
  show('prog');
  resetProg();
  const p=new URLSearchParams({url,mode,quality});
  es=new EventSource('/download?'+p);
  es.onmessage=e=>{
    const d=JSON.parse(e.data);
    if(d.type==='progress'){
      setProg(d.percent,d.size,d.speed,d.eta);
    }else if(d.type==='status'){
      document.getElementById('prog-lbl').innerHTML=d.message;
      setProg(98);
    }else if(d.type==='done'){
      es.close();hide('prog');
      showResult(true,'Download Complete!','Saved to your Downloads\\YTDownloader folder',d.folder);
    }else if(d.type==='fail'){
      es.close();hide('prog');
      showResult(false,'Download Failed',d.message);
    }
  };
  es.onerror=()=>es.close();
}

function resetProg(){
  setProg(0,'—','—','—');
  document.getElementById('prog-lbl').innerHTML='<span class="spin"></span>DOWNLOADING';
  document.getElementById('status-msg').textContent='';
}
function setProg(pct,size,speed,eta){
  document.getElementById('prog-pct').textContent=pct.toFixed?pct.toFixed(1)+'%':pct+'%';
  document.getElementById('bar').style.width=pct+'%';
  if(size!=null)document.getElementById('s-size').textContent=size;
  if(speed!=null)document.getElementById('s-speed').textContent=speed;
  if(eta!=null)document.getElementById('s-eta').textContent=eta;
}

function showResult(ok,title,sub,folder){
  const el=document.getElementById('result');
  el.innerHTML=`<div class="${ok?'ok':'fail'}">
    <div class="r-icon">${ok?'✅':'⚠️'}</div>
    <div class="r-title">${title}</div>
    <div class="r-sub">${sub}</div>
    ${folder?`<div class="r-path">📁 ${folder}</div>`:''}
    <br/><button class="btn ghost" style="width:100%" onclick="resetAll()">⟳ Download Another</button>
  </div>`;
  show('result');
}

function resetAll(){
  hide('result');hide('prog');hide('preview');
  document.getElementById('url').value='';
  document.getElementById('url').focus();
}

function show(id){document.getElementById(id).style.display='block'}
function hide(id){document.getElementById(id).style.display='none'}
function shake(){
  const el=document.getElementById('url');
  el.style.borderColor='#ff5c35';
  setTimeout(()=>el.style.borderColor='',800);
}
function fmtViews(n){
  if(!n)return'?';
  if(n>=1e9)return(n/1e9).toFixed(1)+'B';
  if(n>=1e6)return(n/1e6).toFixed(1)+'M';
  if(n>=1e3)return(n/1e3).toFixed(1)+'K';
  return n;
}
</script>
</body>
</html>
