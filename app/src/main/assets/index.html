<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>YDROP</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid #e8e8e2;padding:14px 20px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,0.05)}
.logo-icon{width:34px;height:34px;flex-shrink:0}
.logo-text{font-size:20px;font-weight:800;color:#1a1a1a;letter-spacing:-0.5px}
.logo-text span{color:#ff4d00}
.badge{margin-left:auto;font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px}
.badge-warn{background:#fff3e0;color:#e65100}
#setup-screen{padding:48px 24px;text-align:center}
.setup-circle{width:80px;height:80px;margin:0 auto 20px;background:#fff8f5;border-radius:50%;display:flex;align-items:center;justify-content:center;border:2px solid #ffe0d0}
.setup-title{font-size:22px;font-weight:700;margin-bottom:8px;color:#1a1a1a}
.setup-sub{font-size:14px;color:#888;line-height:1.7;margin-bottom:28px}
.setup-bar-bg{background:#e8e8e2;border-radius:4px;height:6px;overflow:hidden;margin-bottom:10px;border-radius:99px}
.setup-bar-fill{height:100%;background:linear-gradient(90deg,#ff4d00,#ff8c00);border-radius:99px;width:0%;transition:width 0.5s ease}
.setup-msg{font-size:12px;color:#aaa;font-family:'JetBrains Mono',monospace}
.content{padding:20px;display:none}
.card{background:#fff;border-radius:16px;padding:20px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,0.05)}
.lbl{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#bbb;margin-bottom:10px;display:block}
.url-row{display:flex;gap:8px}
.url-in{flex:1;border:1.5px solid #ebebeb;border-radius:10px;padding:13px 14px;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;color:#1a1a1a;background:#fafaf8;outline:none;transition:border-color .2s}
.url-in:focus{border-color:#ff4d00;background:#fff}
.url-in::placeholder{color:#ccc}
.btn-fetch{background:#1a1a1a;color:#fff;border:none;border-radius:10px;padding:13px 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;white-space:nowrap;transition:background .15s}
.btn-fetch:hover{background:#333}
.btn-fetch:disabled{background:#eee;color:#bbb;cursor:not-allowed}
#preview-card{display:none;animation:up .25s ease}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.thumb-wrap{position:relative;border-radius:12px;overflow:hidden;margin-bottom:14px}
.thumb-wrap img{width:100%;height:170px;object-fit:cover;display:block}
.thumb-dur{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.75);color:#fff;font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px;font-family:'JetBrains Mono',monospace}
.vtitle{font-size:15px;font-weight:600;line-height:1.4;margin-bottom:3px}
.vmeta{font-size:12px;color:#aaa}
#options-card{display:none;animation:up .25s ease}
.modes{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
.mode-tile{border:1.5px solid #ebebeb;border-radius:12px;padding:14px;text-align:center;cursor:pointer;background:#fafaf8;transition:all .15s}
.mode-tile.on{border-color:#ff4d00;background:#fff8f5}
.mode-em{font-size:26px;margin-bottom:4px}
.mode-nm{font-size:13px;font-weight:600}
.mode-ht{font-size:11px;color:#bbb;margin-top:2px}
.pills{display:flex;gap:6px;flex-wrap:wrap}
.pill{padding:7px 14px;border:1.5px solid #ebebeb;border-radius:99px;font-size:12px;font-weight:500;cursor:pointer;background:#fafaf8;color:#888;transition:all .15s;font-family:'JetBrains Mono',monospace}
.pill.on{border-color:#ff4d00;background:#fff8f5;color:#ff4d00;font-weight:600}
.btn-dl{width:100%;padding:16px;border:none;border-radius:12px;background:#ff4d00;color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif;margin-top:18px;letter-spacing:-0.2px;transition:all .15s}
.btn-dl:active{transform:scale(0.98);background:#e64400}
#prog-card{display:none;animation:up .25s ease}
.prog-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:12px}
.prog-lbl{font-size:11px;font-weight:700;letter-spacing:1.5px;color:#ff4d00}
.prog-pct{font-size:40px;font-weight:800;color:#1a1a1a;letter-spacing:-2px;line-height:1}
.prog-bg{height:6px;background:#f0f0eb;border-radius:99px;overflow:hidden;margin-bottom:14px}
.prog-fill{height:100%;background:linear-gradient(90deg,#ff4d00,#ff8c00);border-radius:99px;transition:width .4s ease;width:0}
.stats{display:flex;gap:20px}
.sl{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#ccc;margin-bottom:3px}
.sv{font-size:14px;font-weight:600;color:#1a1a1a;font-family:'JetBrains Mono',monospace}
.prog-sub{font-size:12px;color:#bbb;margin-top:12px;font-family:'JetBrains Mono',monospace}
#result-card{display:none;border-radius:16px;overflow:hidden;animation:up .25s ease}
.r-ok{background:#f0faf5;border:1.5px solid #86efac;padding:28px 20px;text-align:center}
.r-fail{background:#fff5f5;border:1.5px solid #fca5a5;padding:28px 20px;text-align:center}
.r-icon{font-size:44px;margin-bottom:12px}
.r-title{font-size:20px;font-weight:700;margin-bottom:6px}
.r-sub{font-size:13px;color:#888;margin-bottom:16px;line-height:1.6}
.r-path{background:#fff;border-radius:8px;padding:10px 12px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#ff4d00;word-break:break-all;text-align:left;margin-bottom:16px}
.btn-again{background:#1a1a1a;color:#fff;border:none;border-radius:10px;padding:12px 28px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Plus Jakarta Sans',sans-serif}
.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="topbar">
  <svg class="logo-icon" viewBox="0 0 34 34" fill="none">
    <rect width="34" height="34" rx="9" fill="#ff4d00"/>
    <path d="M11 12l6 9 6-9" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="11" y1="25" x2="23" y2="25" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/>
  </svg>
  <span class="logo-text">YD<span>R</span>OP</span>
  <span class="badge badge-warn" id="top-badge" style="display:none">Setting up...</span>
</div>

<!-- Setup screen -->
<div id="setup-screen">
  <div class="setup-circle">
    <svg width="38" height="38" viewBox="0 0 38 38" fill="none">
      <path d="M19 8v14M19 22l-6-6M19 22l6-6" stroke="#ff4d00" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M8 30h22" stroke="#ff4d00" stroke-width="2.5" stroke-linecap="round"/>
    </svg>
  </div>
  <div class="setup-title">Setting up YDROP</div>
  <div class="setup-sub">Downloading the download engine.<br/>Takes about 30 seconds — only once.</div>
  <div class="setup-bar-bg"><div class="setup-bar-fill" id="s-bar"></div></div>
  <div class="setup-msg" id="s-msg">Starting...</div>
</div>

<!-- Main UI -->
<div class="content" id="main">

  <div class="card">
    <span class="lbl">YouTube URL</span>
    <div class="url-row">
      <input class="url-in" type="url" id="url" placeholder="Paste YouTube link..." autocomplete="off"/>
      <button class="btn-fetch" id="fetch-btn" onclick="fetchInfo()">Fetch</button>
    </div>
  </div>

  <div class="card" id="preview-card">
    <div class="thumb-wrap">
      <img id="thumb" src="" alt=""/>
      <span class="thumb-dur" id="dur"></span>
    </div>
    <div class="vtitle" id="vtitle"></div>
    <div class="vmeta" id="vmeta"></div>
  </div>

  <div class="card" id="options-card">
    <span class="lbl">Format</span>
    <div class="modes">
      <div class="mode-tile on" id="m-v" onclick="setMode('video')">
        <div class="mode-em">🎬</div>
        <div class="mode-nm">Video</div>
        <div class="mode-ht">MP4</div>
      </div>
      <div class="mode-tile" id="m-a" onclick="setMode('audio')">
        <div class="mode-em">🎵</div>
        <div class="mode-nm">Audio</div>
        <div class="mode-ht">MP3</div>
      </div>
    </div>
    <div id="qs">
      <span class="lbl">Quality</span>
      <div class="pills" id="pills"></div>
    </div>
    <button class="btn-dl" onclick="startDownload()">⬇ Download</button>
  </div>

  <div class="card" id="prog-card">
    <div class="prog-head">
      <span class="prog-lbl" id="p-lbl">DOWNLOADING</span>
      <span class="prog-pct" id="p-pct">0%</span>
    </div>
    <div class="prog-bg"><div class="prog-fill" id="p-bar"></div></div>
    <div class="stats">
      <div><div class="sl">Size</div><div class="sv" id="p-sz">—</div></div>
      <div><div class="sl">Speed</div><div class="sv" id="p-sp">—</div></div>
      <div><div class="sl">ETA</div><div class="sv" id="p-eta">—</div></div>
    </div>
    <div class="prog-sub" id="p-sub"></div>
  </div>

  <div id="result-card"></div>
</div>

<script>
let mode='video', quality='best', es=null;

async function boot() {
  let tries = 0;
  while (tries < 30) {
    try {
      const r = await fetch('/health');
      if (r.ok) {
        const d = await r.json();
        if (d.ready) { setSetup(100,'Ready!'); setTimeout(showMain,300); return; }
        document.getElementById('top-badge').style.display='inline';
        watchSetup(); return;
      }
    } catch(e) {}
    setSetup(Math.min(30, tries * 3), 'Connecting to app...');
    await sleep(500); tries++;
  }
  showMain();
}

async function watchSetup() {
  let p = 20;
  while (true) {
    await sleep(1500);
    try {
      const r = await fetch('/health');
      const d = await r.json();
      p = Math.min(95, p + 5);
      setSetup(p, 'Downloading engine... ' + p + '%');
      if (d.ready) { setSetup(100,'Done!'); document.getElementById('top-badge').style.display='none'; setTimeout(showMain,400); return; }
    } catch(e) {}
    if (p >= 95) { showMain(); return; }
  }
}

function setSetup(pct, msg) {
  document.getElementById('s-bar').style.width = pct+'%';
  document.getElementById('s-msg').textContent = msg;
}
function showMain() {
  document.getElementById('setup-screen').style.display='none';
  document.getElementById('main').style.display='block';
}

async function fetchInfo() {
  const url = document.getElementById('url').value.trim();
  if (!url) { document.getElementById('url').style.borderColor='#ff4d00'; setTimeout(()=>document.getElementById('url').style.borderColor='',800); return; }
  const btn = document.getElementById('fetch-btn');
  btn.disabled=true; btn.innerHTML='<span class="spin"></span>';
  ['preview-card','options-card','prog-card','result-card'].forEach(hide);
  try {
    const r = await fetch('/info?url='+encodeURIComponent(url));
    const d = await r.json();
    if (d.error) throw new Error(d.error);
    document.getElementById('thumb').src = d.thumbnail;
    document.getElementById('dur').textContent = d.duration;
    document.getElementById('vtitle').textContent = d.title;
    document.getElementById('vmeta').textContent = (d.uploader||'')+(d.views?' · '+fv(d.views)+' views':'');
    buildPills(d.formats);
    show('preview-card'); show('options-card');
  } catch(e) {
    showResult(false,'Could not fetch video','Make sure the URL is a valid YouTube link.\n'+e.message);
  }
  btn.disabled=false; btn.textContent='Fetch';
}

function buildPills(fmts) {
  const c=document.getElementById('pills'); c.innerHTML=''; quality='best';
  const add=(l,v,a)=>{ const p=document.createElement('div'); p.className='pill'+(a?' on':''); p.textContent=l;
    p.onclick=()=>{ document.querySelectorAll('.pill').forEach(x=>x.classList.remove('on')); p.classList.add('on'); quality=v; }; c.appendChild(p); };
  add('Best','best',true); (fmts||[]).forEach(f=>add(f.label,f.value,false));
}

function setMode(m) {
  mode=m;
  document.getElementById('m-v').classList.toggle('on',m==='video');
  document.getElementById('m-a').classList.toggle('on',m==='audio');
  document.getElementById('qs').style.display=m==='audio'?'none':'block';
}

function startDownload() {
  const url=document.getElementById('url').value.trim(); if(!url)return;
  if(es)es.close();
  ['options-card','preview-card','result-card'].forEach(hide); show('prog-card');
  document.getElementById('p-pct').textContent='0%';
  document.getElementById('p-bar').style.width='0';
  document.getElementById('p-lbl').textContent='DOWNLOADING';
  ['p-sz','p-sp','p-eta'].forEach(id=>document.getElementById(id).textContent='—');

  es = new EventSource('/download?'+new URLSearchParams({url,mode,quality}));
  es.onmessage = e => {
    const d=JSON.parse(e.data);
    if(d.type==='progress') {
      const p=parseFloat(d.percent);
      document.getElementById('p-pct').textContent=p.toFixed(1)+'%';
      document.getElementById('p-bar').style.width=p+'%';
      document.getElementById('p-sz').textContent=d.size||'—';
      document.getElementById('p-sp').textContent=d.speed||'—';
      document.getElementById('p-eta').textContent=d.eta||'—';
    } else if(d.type==='status') {
      document.getElementById('p-lbl').textContent=(d.message||'').toUpperCase();
    } else if(d.type==='done') {
      es.close(); hide('prog-card');
      showResult(true,'Download Complete!','File saved to Downloads/YTDownloader',d.folder);
    } else if(d.type==='fail') {
      es.close(); hide('prog-card');
      showResult(false,'Download Failed',d.message||'Please try again.');
    }
  };
  es.onerror=()=>es.close();
}

function showResult(ok,title,sub,folder) {
  const el=document.getElementById('result-card');
  el.innerHTML=`<div class="${ok?'r-ok':'r-fail'}">
    <div class="r-icon">${ok?'✅':'⚠️'}</div>
    <div class="r-title">${title}</div>
    <div class="r-sub">${sub}</div>
    ${folder?`<div class="r-path">📁 ${folder}</div>`:''}
    <button class="btn-again" onclick="resetAll()">Download Another</button>
  </div>`; show('result-card');
}
function resetAll() {
  ['result-card','prog-card','preview-card','options-card'].forEach(hide);
  document.getElementById('url').value='';
}
function show(id){document.getElementById(id).style.display='block'}
function hide(id){document.getElementById(id).style.display='none'}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}
function fv(n){if(!n)return'?';if(n>=1e9)return(n/1e9).toFixed(1)+'B';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return n}

document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('url').addEventListener('keydown',e=>{ if(e.key==='Enter')fetchInfo(); });
  document.getElementById('url').addEventListener('paste',()=>setTimeout(()=>{ const v=document.getElementById('url').value; if(v.includes('youtube.com')||v.includes('youtu.be'))fetchInfo(); },80));
  boot();
});
</script>
</body>
</html>
